version: 2.1

references:
  pnpm_key: &pnpm_key v1-pnpm-store-{{ checksum "pnpm-lock.yaml" }}

  save_cache: &save_cache
    save_cache:
      key: *pnpm_key
      paths:
        - /home/circleci/.pnpm-store

  restore_cache: &restore_cache
    restore_cache:
      key: *pnpm_key

  pnpm_setup: &pnpm_setup
    run:
      name: Install pnpm and run `pnpm install`
      command: |
        corepack enable
        corepack prepare pnpm@9.15.9 --activate
        pnpm config set store-dir /home/circleci/.pnpm-store
        pnpm install --frozen-lockfile

  playwright_setup: &playwright_setup
    run:
      name: Install Playwright Chromium runtime
      command: |
        corepack enable
        corepack prepare pnpm@9.15.9 --activate
        pnpm config set store-dir /home/circleci/.pnpm-store
        pnpm --filter integration-test exec playwright install --with-deps chromium

jobs:
  build-test:
    docker:
      - image: cimg/node:lts-browsers
    steps:
      - checkout
      - *restore_cache
      - *pnpm_setup
      - *playwright_setup
      - run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" pnpm run test
      - run: pnpm run deploy:chrome
      - *save_cache
      - run: rm -rf packages/extension/build/build_chrome
      - store_artifacts:
          path: packages/extension/build
          destination: dist

  publish:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - *restore_cache
      - *pnpm_setup
      - run: pnpm run deploy
      - run: pnpm publish-extension
      - store_artifacts:
          path: packages/extension/build
          destination: dist
      - run: pnpm release-it
      - *save_cache

workflows:
  version: 2
  build:
    jobs:
      - build-test:
          filters:
            tags:
              only: /^v.*/
      - publish:
          requires:
            - build-test
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
